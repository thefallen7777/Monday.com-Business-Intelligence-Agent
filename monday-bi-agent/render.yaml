services:
  - type: web
    name: monday-bi-agent
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: MONDAY_API_TOKEN
        sync: false
      - key: MONDAY_API_URL
        value: https://api.monday.com/v2
      - key: MONDAY_API_VERSION
        value: 2026-04
      - key: DEALS_BOARD_NAME
        value: Deals
      - key: WORK_ORDERS_BOARD_NAME
        value: Work Orders